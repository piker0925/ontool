name: CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'back/**'
      - 'docker-compose.prod.yml'
      - 'nginx/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./back

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          build-root-directory: ./back

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run tests with coverage
        run: ./gradlew check

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: back/build/reports/jacoco/test/html/

      - name: Build boot jar
        run: ./gradlew bootJar --no-daemon -x test

      - name: Upload backend jar
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: back/build/libs/*.jar
          retention-days: 1

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Download backend jar
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: back/

      - name: Rename jar for Docker build
        run: mv back/*.jar back/app.jar

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./back
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/devtoolbox-backend:latest

  deploy:
    name: Deploy to OCI
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Copy compose & nginx config to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_HOST }}
          username: opc
          key: ${{ secrets.OCI_SSH_KEY }}
          source: "docker-compose.prod.yml,nginx"
          target: "~/DevToolbox"

      - name: Deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_ROOT_PASSWORD: ${{ secrets.DB_ROOT_PASSWORD }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          STORAGE_BASE_URL: ${{ secrets.STORAGE_BASE_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          GH_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.OCI_HOST }}
          username: opc
          key: ${{ secrets.OCI_SSH_KEY }}
          envs: GHCR_TOKEN,DB_USERNAME,DB_PASSWORD,DB_ROOT_PASSWORD,ADMIN_USERNAME,ADMIN_PASSWORD,CORS_ORIGIN,STORAGE_BASE_URL,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,KAKAO_CLIENT_ID,KAKAO_CLIENT_SECRET,JWT_SECRET,FRONTEND_URL,GH_ACTOR
          script: |
            set -e
            mkdir -p ~/DevToolbox
            cd ~/DevToolbox

            {
              printf "DB_USERNAME=%s\n"       "${DB_USERNAME}"
              printf "DB_PASSWORD=%s\n"       "${DB_PASSWORD}"
              printf "DB_ROOT_PASSWORD=%s\n"  "${DB_ROOT_PASSWORD}"
              printf "ADMIN_USERNAME=%s\n"    "${ADMIN_USERNAME}"
              printf "ADMIN_PASSWORD=%s\n"    "${ADMIN_PASSWORD}"
              printf "CORS_ORIGIN=%s\n"       "${CORS_ORIGIN}"
              printf "STORAGE_BASE_URL=%s\n"  "${STORAGE_BASE_URL}"
              printf "GOOGLE_CLIENT_ID=%s\n"  "${GOOGLE_CLIENT_ID}"
              printf "GOOGLE_CLIENT_SECRET=%s\n" "${GOOGLE_CLIENT_SECRET}"
              printf "KAKAO_CLIENT_ID=%s\n"   "${KAKAO_CLIENT_ID}"
              printf "KAKAO_CLIENT_SECRET=%s\n" "${KAKAO_CLIENT_SECRET}"
              printf "JWT_SECRET=%s\n"        "${JWT_SECRET}"
              printf "FRONTEND_URL=%s\n"      "${FRONTEND_URL}"
            } > .env

            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GH_ACTOR}" --password-stdin
            docker compose -f docker-compose.prod.yml pull backend
            docker compose -f docker-compose.prod.yml up -d

            # nginx.conf은 단일 파일 바인드 마운트라, 실행 중 컨테이너는 시작 시점의 inode를 계속 본다.
            # 파일만 교체(SCP)되면 새 inode를 안 봐서 `nginx -s reload`로는 새 설정이 반영되지 않는다.
            # → 컨테이너를 재생성해야 마운트가 새 inode로 다시 잡힌다. 다만 잘못된 설정으로 재생성하면
            #   nginx가 부팅 실패해 사이트가 다운되므로, 실제와 동일한 이미지·네트워크·인증서로 먼저 검증한다.
            #   (검증 실패 시 set -e로 배포가 중단되고 기존 nginx는 그대로 살아남는다.)
            NGINX_NET=$(docker inspect devtoolbox-nginx -f '{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}' | awk '{print $1}')
            docker run --rm --network "${NGINX_NET}" \
              -v "$PWD/nginx/nginx.conf:/etc/nginx/nginx.conf:ro" \
              -v "$PWD/nginx/ssl:/etc/nginx/ssl:ro" \
              nginx:alpine nginx -t
            docker compose -f docker-compose.prod.yml up -d --force-recreate nginx

            docker image prune -f
