spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  security:
    user:
      name: ${ADMIN_USERNAME}
      password: ${ADMIN_PASSWORD}

cors:
  origin: ${CORS_ORIGIN:http://localhost:5173}

storage:
  base-url: ${STORAGE_BASE_URL}
  upload-dir: uploads

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
