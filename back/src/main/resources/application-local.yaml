spring:
  datasource:
    url: jdbc:mysql://localhost:3306/devtoolbox?serverTimezone=UTC&characterEncoding=UTF-8
    username: devtoolbox
    password: "1234"
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  # 로컬 개발 흐름 무변화 (ADR-0025): 엔티티를 자유롭게 고치면 create-drop이 즉시 반영한다.
  # Flyway는 prod 전용 — 로컬에서는 꺼서 마이그레이션 스크립트 작성 없이도 개발이 막히지 않게 한다.
  flyway:
    enabled: false
  security:
    user:
      name: admin
      password: 1234

# 로컬 개발 중 폰 등 같은 와이파이의 다른 기기에서 LAN IP로 접속해 테스트할 수 있도록 사설망 대역을 패턴으로 허용한다.
# (프로덕션은 application-prod.yaml에서 CORS_ORIGIN 환경변수로 별도 관리되므로 영향 없음)
cors:
  origin: http://localhost:5173,http://127.0.0.1:5173,http://192.168.*.*:5173,http://10.*.*.*:5173

storage:
  upload-dir: uploads
  # 상대경로로 비워둔다: 절대주소(http://localhost:8080)를 박으면 LAN의 다른 기기(폰 등)에서
  # 접속했을 때 다운로드/미리보기 URL이 그 기기 자신의 localhost를 가리켜 실패한다.
  base-url: ""
  # 로컬은 짧게 두어 청소 동작을 빠르게 확인할 수 있게 한다.
  result-ttl: PT2M

# 익명 식별·쿼터 (ADR-0019). 식별자는 프론트가 X-Client-Id 헤더로 보낸다(쿠키 아님).
# 사용자별 동시 작업(PENDING+RUNNING) 상한. "전부 처리" 목표에 맞춰 넉넉히 둔다(배치가 이보다 크면 거부됨).
identity:
  quota:
    max-in-flight: 200

# 워커 레인별 동시 실행 상한 (ADR-0019). 2 OCPU 기준 기본값. 재배포 없이 조정 가능.
scheduling:
  worker:
    lane:
      heavy: 2
      video: 1

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info

logging:
  level:
    org.hibernate.SQL: warn

springdoc:
  swagger-ui:
    path: /swagger-ui.html
