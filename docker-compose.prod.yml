services:
  mysql:
    image: mysql:8.0
    container_name: devtoolbox-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: devtoolbox
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/piker0925/devtoolbox-backend:latest
    container_name: devtoolbox-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/devtoolbox?serverTimezone=UTC&characterEncoding=UTF-8
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      CORS_ORIGIN: ${CORS_ORIGIN}
      STORAGE_BASE_URL: ${STORAGE_BASE_URL}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8080:8080"

  nginx:
    image: nginx:alpine
    container_name: devtoolbox-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro

volumes:
  mysql_data:
  uploads_data:
