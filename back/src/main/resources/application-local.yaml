spring:
  datasource:
    url: jdbc:mysql://localhost:3306/devtoolbox?serverTimezone=UTC&characterEncoding=UTF-8
    username: devtoolbox
    password: "1234"
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  security:
    user:
      name: admin
      password: 1234

storage:
  upload-dir: uploads
  base-url: http://localhost:8080
  # 로컬은 짧게 두어 청소 동작을 빠르게 확인할 수 있게 한다.
  result-ttl: PT2M

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info

logging:
  level:
    org.hibernate.SQL: warn

springdoc:
  swagger-ui:
    path: /swagger-ui.html
